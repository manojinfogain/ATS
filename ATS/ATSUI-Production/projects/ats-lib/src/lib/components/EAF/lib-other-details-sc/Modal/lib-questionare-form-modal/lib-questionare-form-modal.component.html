<form [formGroup]="questionareForm" (ngSubmit)="updateQuestionareForm(questionareForm)">
    <div class="ats-modal-header">
        <h1>{{data?.title}}</h1>
        <button class="btn-m-close" type="button" (click)="closeModal()"><i class="fa fa-times"></i></button>
    </div>
    <div mat-dialog-content>
        <div class="ats-modal-body">
            <div class="screen-mat-card-b">
                <div class="questionare-wrap">
                    <div class="ats-radio-mat-flat ats-quest-rd">
                        <mat-radio-group aria-label="Select an option" formControlName="yesNo"
                            (change)="getYesNo($event)">
                            <mat-radio-button value="Y">Yes</mat-radio-button>
                            <mat-radio-button value="N">No</mat-radio-button>
                        </mat-radio-group>
                    </div>
                    <div class="text-qs">
                        <mat-form-field class="ats-mat-form-field" [appearance]="appearance">
                            <textarea matInput placeholder="Enter Details" formControlName="details"
                                [required]="reqDetails"></textarea>
                        </mat-form-field>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="ats-modal-footer text-center">
        <button type="submit" class="btn btn-infocon">
            Submit
        </button>
        <button type="button" class="btn btn-simple-ats" (click)="closeModal()">Cancel
        </button>
    </div>
</form>
