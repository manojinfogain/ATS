<div class="ats-auth-wrapper">
    <div class="auth-content-box">
        <form [formGroup]="passwordForm" (ngSubmit)="submitForm(passwordForm)">
            <div class="auth-box-card">
                <div class="auth-box-headr">
                    <h3>Forgot Password</h3>
                </div>
                <div class="auth-box-body">
                    <div class="sm-text">
                        <p *ngIf="isForgot">Enter Your Email Address To Reset Your Password.
                        </p>
                        <p class="p-can" *ngIf="!isForgot">We have sent an OTP on your  Email ID
                            <strong>{{email}}</strong> to reset password.
                            Please enter OTP in below given field.
                        </p>
                    </div>
                    <div class="auth-form">
                        <div class="auth-form-row" *ngIf="isForgot">
                            <mat-form-field appearance="outline" class="ats-from-control">
                                <mat-label>Email</mat-label>
                                <input matInput required formControlName="email" maxlength="200">
                            </mat-form-field>

                        </div>
                        <!-- end row -->
                        <div class="auth-form-row" *ngIf="!isForgot">
                            <mat-form-field appearance="outline" class="ats-from-control">
                                <mat-label>OTP</mat-label>
                                <input matInput required formControlName="otp" onlyNumber maxlength="6">
                                <!-- <mat-error class="form-error" *ngIf="(otp?.touched || otp?.dirty) && otp?.invalid">
                                    <span *ngIf="otp?.errors?.required">
                                     Please enter OTP.
                                    </span>
                                </mat-error> -->
                            </mat-form-field>

                        </div>
                        <!-- end row -->
                        <ng-container *ngIf="!isForgot">
                            <app-password-share [form]="passwordForm" [passText]=" 'New Password'"></app-password-share>
                        </ng-container>

                    </div>
                    <!-- end form row -->
                </div>
                <div class="auth-box-footer">
                    <button type="submit" class="btn btn-infocon" [disabled]="passwordForm?.invalid">Submit
                        <i class="fa fa-save"></i>
                    </button>
                    <button type="button" class="btn btn-infocon" *ngIf="!isForgot" (click)="resendOTP()">Resend OTP
                        <i class="fa fa-save"></i>
                    </button>
                    <button type="button" class="btn btn-simple-ats" (click)="resetForm()">Reset
                        <i class="fa fa-refresh"></i>
                    </button>
                </div>
            </div>
            <!-- end card -->
        </form>
    </div>
</div>
