<div class="ats-modal-header">
    <h1>{{data.title}}</h1>
    <button class="btn-m-close" type="button" (click)="closeModal()"><i class="fa fa-times"></i></button>
</div>

<div mat-dialog-content>    
    <div class="ats-modal-body" *ngIf="pdfPreviewData" >
      <app-ats-pdf-viewer-external [pdfBlob]="pdfPreviewData" [fileName]="documentName">
            </app-ats-pdf-viewer-external>
    </div>
</div>
