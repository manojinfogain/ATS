<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ATS Global System</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.gstatic.com">
<!-- expose nonce to Angular runtime -->
<meta name="csp-nonce" content="CSP_NONCE_PLACEHOLDER">

<script nonce="CSP_NONCE_PLACEHOLDER">
(function () {
    var meta = document.querySelector('meta[name="csp-nonce"]');
    if (meta) {
        window.__webpack_nonce__ = meta.content;
        window.ngCspNonce = meta.content;
        console.debug("CSP nonce loaded");
    }
})();
</script>
</head>
<body>
  <app-root ngCspNonce="CSP_NONCE_PLACEHOLDER"></app-root>
</body>
</html>
