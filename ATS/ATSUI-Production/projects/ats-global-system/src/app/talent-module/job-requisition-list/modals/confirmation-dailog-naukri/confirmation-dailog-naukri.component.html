<div class="mat-header">
  <h3 mat-dialog-title>{{ data?.title || 'Confirmation' }}</h3>
</div>
<mat-dialog-content>
  <p [innerHTML]="data?.message || 'Are you sure you want to proceed?'"></p>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <button type="button" class="btn btn-infocon" tabindex="1" (click)="onYesClick()">
   {{data?.buttonText?.ok}}
  </button>
  <button type="button" class="btn btn-simple-ats" tabindex="-1" (click)="onNoClick()">
    {{data?.buttonText?.cancel}}
  </button>
</mat-dialog-actions>
