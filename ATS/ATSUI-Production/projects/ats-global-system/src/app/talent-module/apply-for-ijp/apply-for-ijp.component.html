<div class="info-connect-right">
    <div class="page-content-wrapper">
        <div class="page-container-inner">
            <div class="content-body">
                <!-- Tab Navigation -->
                <mat-tab-group class="ijp-tabs" [(selectedIndex)]="selectedTabIndex" (selectedTabChange)="onTabChange($event)">
                                       
                    <!-- Tab 2: My Applications Dashboard -->
                    <mat-tab>
                        <ng-template mat-tab-label>
                            <span class="material-icons-outlined tab-icon">dashboard</span>
                            <span class="tab-label-text">Proposal Dashboard</span>
                            <span class="tab-badge" *ngIf="applicationCount > 0">{{ applicationCount }}</span>
                        </ng-template>
                        
                        <div class="tab-content-wrapper">
                            <app-my-applications-dashboard></app-my-applications-dashboard>
                        </div>
                    </mat-tab>

                    <!-- Tab 1: Browse Opportunities -->
                    <mat-tab>
                        <ng-template mat-tab-label>
                            <span class="material-icons-outlined tab-icon">explore</span>
                            <span class="tab-label-text">Internal JOB Opportunity Openings</span>
                        </ng-template>
                        
                        <div class="tab-content-wrapper">
                            <app-browse-opportunities (applicationApplied)="onApplicationApplied()"></app-browse-opportunities>
                        </div>
                    </mat-tab>
                    
                </mat-tab-group>
            </div>
            <!-- end content body -->
        </div>
        <!-- end inner container -->
    </div>
    <!-- end page content wrapper -->
</div>
<!-- end right wrapper -->
