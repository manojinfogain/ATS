<header class="ats-header-wrap" *ngIf="isHeaderShow">
    <mat-toolbar class="ats-toolbar">
        <div class="left-head-ats">
            <div class="brand-ats">
                <div class="head-logo">
                    <img src="assets/images/Infogain_Logo2.png" alt="" title="ATS Global System">
                </div>
                <div class="brant-title">
                    <h2> Global <span>A</span> <span>T</span> <span>S</span></h2>
                </div>
            </div>


        </div>
        <div class="right-side-header">
            <div class="header-ui" *ngIf="hideMenu">
                <ul>
                    <li class="notification-li" *ngIf="env?.isNotification">
                       <app-notification-d></app-notification-d>
                    </li>
                    <li *ngIf="env?.locationWise && showLocMenu && !isShowForMFAScreen">
                        <button mat-button class="user-button" [matMenuTriggerFor]="locMenu">
                            <div class="location-name">
                                <!-- <span class="material-icons-outlined">
                                    edit_location_alt
                                    </span> -->
                                <span class="loc-title">{{locationData?.locName}}</span>
                                <ng-container [ngSwitch]="locationData?.locId">
                                    <ng-container *ngSwitchCase="1">
                                      <span class="icon-flag"></span> 
                                    </ng-container>
                                    <ng-container *ngSwitchCase="2">
                                        <span class="icon-flag"></span> 
                                    </ng-container>
                                    <ng-container *ngSwitchCase="4">
                                        <span class="icon-flag"></span> 
                                    </ng-container>
                                    <ng-container *ngSwitchCase="5">
                                        <span class="icon-flag"></span> 
                                    </ng-container>
                                    <ng-container *ngSwitchCase="10">
                                        <span class="icon-flag"></span> 
                                    </ng-container>
                                    <ng-container *ngSwitchCase="11">
                                        <span class="icon-flag"></span> 
                                    </ng-container>
                                    <ng-container *ngSwitchCase="23">
                                        <span class="icon-flag"></span> 
                                    </ng-container>
                                    <ng-container *ngSwitchCase="3">
                                        <span class="icon-flag us-flag"></span> 
                                    </ng-container>
                                    <ng-container *ngSwitchDefault>
                                    </ng-container>

                                </ng-container>
                                <span class="material-icons-outlined">
                                    keyboard_arrow_down
                                </span>
                                
                            </div>
                        </button>

                        <mat-menu #locMenu="matMenu" class="log-mat-menu location-menu-list" [overlapTrigger]="false">
                            <ul class="dropdown-menu-list">
                                <li class="icon-arrow"></li>
                                <li *ngFor="let data of locationList">
                                    <a href="javascript:void(0)" (click)="switchLocation(data)">
                                        <span class="loc-title">
                                            {{data?.LocName}}
                                        </span>
                                    </a>
                                </li>
                               
                            </ul>
                        </mat-menu>
                    </li>
                    <li>
                        <button mat-button class="user-button" [matMenuTriggerFor]="userMenu">
                            <div class="user-in">
                                <div class="nm-s">
                                   
                                    <!-- <span class="username" *ngIf="userDataLog?.FirstName">
                                        {{userDataLog.DomainId}}
                                     
                                    </span><br> -->
                                    <span class="username" *ngIf="userDataLog?.FirstName">
                                        {{(userDataLog?.FirstName.length>20) ? (userDataLog?.FirstName | slice:0:20)+'...' : (userDataLog?.FirstName)}}
                                        <!-- {{userDataLog?.FirstName| slice:0:22}} -->
                                    </span>
                                    <!-- <span class="profile-type">cc</span> -->
                                </div>
                                <span class="material-icons-outlined">
                                    keyboard_arrow_down
                                </span>
                                <div class="profile-wrap">
                                    <div class="profile-pic">
                                        <img src="{{userDataLog?.Photo| profileImagePipe}}" alt="">
                                        <!-- <img src="../../../../../assets//images/no-profile-male.png"> -->
                                    </div>
                                </div>

                            </div>
                        </button>

                        <mat-menu #userMenu="matMenu" class="log-mat-menu" [overlapTrigger]="false">
                            <ul class="dropdown-menu-list">
                                <li class="icon-arrow"></li>
                                <li>
                                   
                                    <a href="javascript:void(0)">
                                        <i class="fa fa-user" aria-hidden="true"></i>
                                        <span>
                                            {{userDataLog?.FullName}}
                                        </span>
                                    </a>
                                 
                                </li>
                                <li *ngIf="!isMsLogin">
                                    <a href="javascript:void(0)" (click)="logOutATS()">
                                        <i class="fas fa-sign-out-alt"></i> {{isShowForMFAScreen ? 'Back To Login' : 'Logout'}}</a>
                                </li>
                                <li *ngIf="isMsLogin">
                                    <a href="javascript:void(0)" (click)="logOutATS()">
                                        <i class="fas fa-sign-out-alt"></i> Logout for ATS</a>
                                </li>
                                <li *ngIf="isMsLogin">
                                    <a href="javascript:void(0)" (click)="logOutMsOff()">
                                        <i class="fab fa-microsoft"></i> Logout for Microsoft (Office365)</a>
                                </li>
                            </ul>
                        </mat-menu>

                    </li>
                </ul>
            </div>
        </div>
    </mat-toolbar>
</header>
