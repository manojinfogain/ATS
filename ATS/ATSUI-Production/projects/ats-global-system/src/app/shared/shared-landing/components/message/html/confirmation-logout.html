<div class="mat-header">
    <h3 mat-dialog-title> {{data?.headerText}}</h3>
</div>
<mat-dialog-content>
	<p [innerHTML]="data?.message">
	</p>
</mat-dialog-content>
<mat-dialog-actions align="center">
    <button type="submit" class="btn btn-infocon" tabindex="1" mat-dialog-close=true>
        {{data?.buttonText?.ok}}
    </button>
    <button type="button" class="btn btn-simple-ats"  tabindex="-1" mat-dialog-close>
        {{data?.buttonText?.cancel}}
    </button>
</mat-dialog-actions>
