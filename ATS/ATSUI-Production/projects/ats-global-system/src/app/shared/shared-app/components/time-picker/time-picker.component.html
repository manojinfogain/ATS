<ng-container [formGroup]="form">
<div class="time-pick-ats">
    <div class="time-pick-call">
      <mat-form-field>
        <mat-label appRemoveAriaOwns >HH</mat-label>
        <!-- <input matInput (keyup)="timeValid($event)" type="text" placeholder="HH" maxlength="2" formControlName="interviewTimeHours" required> -->
        <mat-select  formControlName="interviewTimeHours" [required]="required"
          (selectionChange)="hoursValid($event)">
          <mat-option value="00">00</mat-option>
          <mat-option value="1">01</mat-option>
          <mat-option value="2">02</mat-option>
          <mat-option value="3">03</mat-option>
          <mat-option value="4">04</mat-option>
          <mat-option value="5">05</mat-option>
          <mat-option value="6">06</mat-option>
          <mat-option value="7">07</mat-option>
          <mat-option value="8">08</mat-option>
          <mat-option value="9">09</mat-option>
          <mat-option value="10">10</mat-option>
          <mat-option value="11">11</mat-option>
          <mat-option value="12">12</mat-option>
          <mat-option value="13">13</mat-option>
          <mat-option value="14">14</mat-option>
          <mat-option value="15">15</mat-option>
          <mat-option value="16">16</mat-option>
          <mat-option value="17">17</mat-option>
          <mat-option value="18">18</mat-option>
          <mat-option value="19">19</mat-option>
          <mat-option value="20">20</mat-option>
          <mat-option value="21">21</mat-option>
          <mat-option value="22">22</mat-option>
          <mat-option value="23">23</mat-option>
        </mat-select>
        <mat-icon matSuffix>
          <i class="far fa-clock"></i>
        </mat-icon>
      </mat-form-field>
    </div>
    <div class="time-pick-call">
      <mat-form-field>
        <!-- <input matInput type="text" (keyup)="timeValid($event)" placeholder="MM" maxlength="2" formControlName="interviewTimeMint" required> -->
        <mat-select placeholder="MM" formControlName="interviewTimeMint" [required]="required">
          <mat-option value="00" [ngStyle]="{'display': isTimeZero == true ? 'block' : 'none' }"
            *ngIf="isTimeZero">00</mat-option>
          <mat-option value="5">05</mat-option>
          <mat-option value="10">10</mat-option>
          <mat-option value="15">15</mat-option>
          <mat-option value="20">20</mat-option>
          <mat-option value="25">25</mat-option>
          <mat-option value="30">30</mat-option>
          <mat-option value="35">35</mat-option>
          <mat-option value="40">40</mat-option>
          <mat-option value="45">45</mat-option>
          <mat-option value="50">50</mat-option>
          <mat-option value="55">55</mat-option>
        </mat-select>
        <mat-icon matSuffix>
          <i class="far fa-clock"></i>
        </mat-icon>
      </mat-form-field>
    </div>
  </div>
  </ng-container>
