<div class="form-row" *ngIf="!isMultiple">
  <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel" class="place-from-control">
    <mat-label appRemoveAriaOwns >{{Title}}</mat-label>
    <mat-select [formControl]="primarySkillTcControlOpt" (selectionChange)="getSelectId($event)">
      <mat-option value="all">All</mat-option>
      <mat-option *ngFor="let list of statusData " [value]="list?.id">{{list?.statusName}}</mat-option>
    </mat-select>
  </mat-form-field>

</div>
<div class="select-ats-src" *ngIf="isMultiple">
  <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
    <mat-label appRemoveAriaOwns >{{Title}} <span class="er">*</span></mat-label>
    <mat-select [formControl]="primarySkillTcControlOpt"  [required]="isDataGetFromParent" multiple
      #select>
      <mat-select-trigger>
        {{multiSelectedVal?.length !== 0 ? multiSelectedVal[0]?.viewValue : ''}}
        <span *ngIf="primarySkillTcControlOpt?.value?.length > 1" class="example-additional-selection">
          (+{{multiSelectedVal.length - 1}} {{primarySkillTcControlOpt?.value?.length === 2 ? 'other' : 'others'}})
        </span>
      </mat-select-trigger>
      <br>
      <mat-option>
                <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
                    [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder"
                    [clearSearchInput]="false">

                </ngx-mat-select-search>
            </mat-option>
      <div class="select-all" *ngIf="primarySkillsList.length >1">
        <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
      </div>
      <mat-option *ngFor="let list of primarySkillsList| primarySkillByTcPipe:searchInput" [value]="list.SkillId" (click)="optionClick()">
        {{list?.SkillName}}
      </mat-option>
    </mat-select>

  </mat-form-field>
</div>
