<div class="sl-vm-control" *ngIf="intMode">
    <mat-form-field>
      <mat-label appRemoveAriaOwns >{{title}}</mat-label>
      <mat-select [formControl]="formControlOpt" [disableOptionCentering]="true" [required]="required"
      (selectionChange)="getSelectId($event)">
        <mat-option *ngFor="let list of listData" [value]="list.id" >
          {{list?.mode}}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>
  
  <div class="sl-vm-control" *ngIf="intType">
    <mat-form-field>
      <mat-label appRemoveAriaOwns >{{title}}</mat-label>
      <mat-select [formControl]="formControlOpt" [disableOptionCentering]="true" [required]="required"
      (selectionChange)="getSelectId($event)">
        <mat-option *ngFor="let list of listData" [value]="list.id" >
          {{list?.interviewType}}
        </mat-option>
      </mat-select>
  
    </mat-form-field>
  </div>
  
  <div class="sl-vm-control" *ngIf="intStatusMultiple">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
      <mat-label appRemoveAriaOwns >{{title}}</mat-label>
      <mat-select [formControl]="formControlOpt" [disableOptionCentering]="true" [required]="required"
        multiple #select>
        <mat-select-trigger>
          {{multiSelectedVal.length !== 0 ? multiSelectedVal[0].viewValue : ''}}
          <span *ngIf="formControlOpt.value?.length > 1" class="example-additional-selection">
            (+{{formControlOpt.value.length - 1}} {{formControlOpt.value?.length === 2 ? 'other' : 'others'}})
          </span>
        </mat-select-trigger>
        <div class="select-all">
          <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
        </div>
        <mat-option *ngFor="let list of listData" [value]="list.statusId"  (click)="optionClick()">
          {{list?.statusName}}
        </mat-option>
      </mat-select>
  
    </mat-form-field>
  </div>
