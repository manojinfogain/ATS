<div class="select-ats-src" *ngIf="!isMultiple">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
        <mat-label appRemoveAriaOwns >{{title}}</mat-label>
        <mat-select [formControl]="parentIdControl" [disableOptionCentering]="true" [required]="required"
            (selectionChange)="getId($event)">
            <mat-option>
                <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
                    [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder"
                    [clearSearchInput]="false">

                </ngx-mat-select-search>
            </mat-option>
            <mat-option value="all" *ngIf="isAllOption">All</mat-option>
            <mat-option *ngFor="let list of PanelList | emplListRecFilter:searchInput" [value]="list.EmpID">
                {{list?.Name}}  ({{list.EmpID}})
            </mat-option>
        </mat-select>

    </mat-form-field>
</div>


<div class="select-ats-src" *ngIf="isMultiple">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
        <mat-label appRemoveAriaOwns >{{title}}</mat-label>
        <mat-select [formControl]="parentIdControl" [disableOptionCentering]="true" [required]="required" multiple
            #select>
            <mat-select-trigger>
                {{multiSelectedVal.length !== 0 ? multiSelectedVal[0].viewValue : ''}}
                <span *ngIf="parentIdControl?.value?.length > 1 && showCount > 1" class="example-additional-selection">
                    (+{{showCount - 1}} {{parentIdControl?.value?.length === 2 ? 'other' : 'others'}})
                </span>
            </mat-select-trigger>
            <mat-option>
                <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
                    [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder"
                    [clearSearchInput]="false">

                </ngx-mat-select-search>
            </mat-option>
            <div class="select-all" *ngIf="!searchInput">
                <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
            </div>
            <mat-option *ngFor="let list of PanelList | emplListRecFilter:searchInput" [value]="list.EmpID"
                (click)="optionClick()">
                {{list?.Name}}  ({{list.EmpID}})
            </mat-option>
        </mat-select>

    </mat-form-field>
</div>
