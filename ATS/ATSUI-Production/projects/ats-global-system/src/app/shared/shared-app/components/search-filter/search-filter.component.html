<div class="search-ats-filter">
    <div class="input-group">
        <div class="input-group-prepend">
          <span class="input-group-text">
            <i class="fa fa-search" aria-hidden="true"></i>
          </span>
        </div>
        <input type="text" class="form-control"  #inputVal  [placeholder]="placeHolder" disableInitialSpace [formControl]="searchControl">
        <button type="button" class="search-icon clear-icon" *ngIf="inputVal.value.length != 0" (click)="reset()" ><i class="fa fa-times" aria-hidden="true"></i></button>

      </div>
      <!-- end search filter -->
</div>
