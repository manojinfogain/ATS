<div class="sl-vm-control" *ngIf="!isMultiple">
  <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
    <mat-label appRemoveAriaOwns >{{title}}</mat-label>
    <mat-select [formControl]="formControlOpt" [disableOptionCentering]="true" [required]="required"
      (selectionChange)="getSelectId($event)">
      <mat-option value="all" *ngIf="isAllOption">All</mat-option>
      <mat-option *ngFor="let list of listData" [value]="list.ID">
        {{list?.ReqType}}
      </mat-option>
    </mat-select>
  </mat-form-field>
</div>

<!-- multiple select -->
<div class="sl-vm-control" *ngIf="isMultiple">
  <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
    <mat-label appRemoveAriaOwns >{{title}}</mat-label>
    <mat-select [formControl]="formControlOpt" [disableOptionCentering]="true" [required]="required" multiple #select>
      <!-- <mat-option value="all" *ngIf="isAllOption">All</mat-option>
        <mat-option *ngFor="let list of listData" [value]="list.ID" >
          {{list?.ReqType}}
        </mat-option> -->
      <mat-select-trigger>
        {{multiSelectedVal.length !== 0 ? multiSelectedVal[0].viewValue : ''}}
        <span *ngIf="formControlOpt?.value?.length > 1" class="example-additional-selection">
          (+{{multiSelectedVal.length - 1}} {{formControlOpt?.value?.length === 2 ? 'other' : 'others'}})
        </span>
      </mat-select-trigger>
      <!-- <mat-option>
        <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
          [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder" [clearSearchInput]="false">

        </ngx-mat-select-search>
      </mat-option> -->
      <br>
      <div class="select-all">
        <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
      </div>
      <mat-option *ngFor="let list of listData | emplListRecFilter:searchInput" [value]="list.ID"
        (click)="optionClick()">
        {{list?.ReqType}}
      </mat-option>
    </mat-select>
  </mat-form-field>
</div>
