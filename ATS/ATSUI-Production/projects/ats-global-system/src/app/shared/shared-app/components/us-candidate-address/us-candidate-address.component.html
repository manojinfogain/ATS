<ng-container [formGroup]="group" >
    <div  [ngClass]="formColClass">
        <mat-form-field [appearance]="appearance" class="place-from-control">
            <mat-label> Street address, P.O box, company name, c/o</mat-label>
            <input matInput
                placeholder="Address Line1"
                required maxlength="60" disableInitialSpace formControlName="addressLine1">
            <mat-hint align="end" class="mat-hint-ad">
                Street address, P.O box, company name, c/o
            </mat-hint>
        </mat-form-field>

    </div>
    <!-- end -->
    <div [ngClass]="formColClass">
        <mat-form-field [appearance]="appearance" class="place-from-control">
            <mat-label> Apartment, suite, unit, building, floor, etc</mat-label>
            <input matInput
                placeholder="Address Line2"
                required maxlength="60" disableInitialSpace
                formControlName="addressLine2">
            <mat-hint align="end" class="mat-hint-ad">
                Apartment, suite, unit, building, floor, etc
            </mat-hint>
        </mat-form-field>

    </div>
    <!-- end -->

    <!-- <div [ngClass]="formColClass">
        <mat-form-field [appearance]="appearance" class="place-from-control">
            <mat-label> Landmark, Locality</mat-label>
            <input matInput
                placeholder="Landmark, Locality"
                maxlength="60" disableInitialSpace
                formControlName="addressLine3">
            <mat-hint align="end" class="mat-hint-ad">
                Enter Landmark, Locality etc.
            </mat-hint>
        </mat-form-field>

    </div> -->
    <!-- end -->

    <div [ngClass]="formColClass">
        <mat-form-field [appearance]="appearance" class="place-from-control">
            <mat-label> City </mat-label>
            <input matInput placeholder="City" maxlength="60"
                disableInitialSpace formControlName="city" required>
            <mat-hint align="end" class="mat-hint-ad">
                Enter City Name
            </mat-hint>
        </mat-form-field>

    </div>
    <!-- end -->

    <div [ngClass]="formColClass">
        <mat-form-field [appearance]="appearance" class="place-from-control">
            <mat-label>State, Province, Region </mat-label>
            <input matInput placeholder="State, Province, Region"
                maxlength="60" disableInitialSpace  AlphabetsOnlyDirective
                formControlName="state" required>
            <mat-hint align="end" class="mat-hint-ad">
                Enter State, Province, Region Name
            </mat-hint>
        </mat-form-field>

    </div>
    <!-- end -->

    <div [ngClass]="formColClass">
        <mat-form-field [appearance]="appearance" class="place-from-control">
            <mat-label>Zip/Postal Code </mat-label>
            <input matInput placeholder="Zip/Postal Code" maxlength="10"
                disableInitialSpace formControlName="postalCode" onlyNumber>
            <mat-hint align="end" class="mat-hint-ad">
                Enter Zip/Postal Code
            </mat-hint>
        </mat-form-field>

    </div>
    <!-- end -->
    <div [ngClass]="formColClass">
        <app-country-list-code [parentIdControl]="getControl('country')"
            [country]="true" 
            [title]="'Country'" [formFieldAppearance]="appearance"
            [required]="true"></app-country-list-code>
    </div>
    <!-- end  -->
</ng-container>
