<div class="mat-header">
    <h3 mat-dialog-title> {{data?.headerText}}</h3>
</div>
<mat-dialog-content>
    <div class="icon-wrapper">
        <span class="material-icons-outlined">
            volunteer_activism
          </span>
    </div>
	<p [innerHTML]="data?.message">
	</p>
    
</mat-dialog-content>
<mat-dialog-actions align="center">
    <!-- <button type="submit" class="btn btn-infocon" tabindex="1" mat-dialog-close=true>
        {{data?.buttonText?.ok}}
    </button> -->
    
    <button *ngIf="isHideCancel" type="button" class="btn btn-infocon"  tabindex="-1" mat-dialog-close>
        {{data?.buttonText?.cancel}}
    </button>
</mat-dialog-actions>
