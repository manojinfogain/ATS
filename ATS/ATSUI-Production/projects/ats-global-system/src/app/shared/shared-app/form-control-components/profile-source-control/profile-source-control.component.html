 <div class="form-row" *ngIf="!isMultiple">

        <mat-select [formControl]="profileSourceControlOpt">

            <mat-option value="0" *ngIf="dropPendingWithMeOfferApr">

<div class="form-row" *ngIf="isMultiple">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
        <mat-label appRemoveAriaOwns >{{profileSourceTitle}}</mat-label>
        <mat-select [formControl]="profileSourceControlOpt" [disableOptionCentering]="true" [required]="required" multiple
            #select>
            <mat-select-trigger>
                {{multiSelectedVal.length !== 0 ? multiSelectedVal[0].viewValue : ''}}
                <span *ngIf="profileSourceControlOpt?.value?.length > 1" class="example-additional-selection">
                    (+{{multiSelectedVal.length - 1}} {{profileSourceControlOpt?.value?.length === 2 ? 'other' :
                    'others'}})
                </span>
            </mat-select-trigger>
            <br>
            <!-- <mat-option>
                <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
                    [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder"
                    [clearSearchInput]="false">

                </ngx-mat-select-search>
            </mat-option> -->
            <!-- <mat-option value="all">All</mat-option> -->
            <mat-option value="0" *ngIf="dropPendingWithMeOfferApr">
                Pending With Me
            </mat-option>
            <div class="select-all">
                <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
            </div>
            <mat-option *ngFor="let list of profileList | emplListRecFilter:searchInput" [value]="list.id"
                (click)="optionClick()">
                {{list?.Name}}
            </mat-option>
        </mat-select>

    </mat-form-field>
</div>
