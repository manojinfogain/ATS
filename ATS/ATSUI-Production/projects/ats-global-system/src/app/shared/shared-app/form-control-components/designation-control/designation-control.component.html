<div class="int-panel-selectionf">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
      <mat-label appRemoveAriaOwns >{{title}}</mat-label>
      <mat-select [formControl]="IdControl" [disableOptionCentering]="true" [required]="required"
        (selectionChange)="getId($event)">
        <mat-option>
          <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
            [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder" [clearSearchInput]="false">
  
          </ngx-mat-select-search>
        </mat-option>
        <mat-option value="all" *ngIf="isAllOption">All</mat-option>
        <ng-container>
            <mat-option *ngFor="let list of recList | desigFilter:searchInput" [value]="list.DesignationId">
                {{list?.DesignationName}}
            </mat-option>
        </ng-container>
        
      </mat-select>
  
    </mat-form-field>
  </div>
  <!-- multi selection -->
