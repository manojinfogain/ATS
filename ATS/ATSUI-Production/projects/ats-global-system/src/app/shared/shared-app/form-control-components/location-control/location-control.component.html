<div class="form-row" *ngIf="!isMultiple">
    <mat-form-field  [appearance]="formFieldAppearance"  [floatLabel]="floatLabel" class="place-from-control">
      <mat-label appRemoveAriaOwns >{{companyLocationTitle}}</mat-label>
      <mat-select [formControl]="locationControlOpt"   (selectionChange)="getSelectId($event)">
        <mat-option value="all">All</mat-option>
        <mat-option *ngFor="let list of locationData" [value]="list?.LocID">{{list?.LocName}}</mat-option>
      </mat-select>
    </mat-form-field>

  </div>

  <div class="select-ats-src" *ngIf="isMultiple">
    <mat-form-field [appearance]="formFieldAppearance"  [floatLabel]="floatLabel">
      <mat-label appRemoveAriaOwns >{{companyLocationTitle}}</mat-label>
        <mat-select [formControl]="locationControlOpt" [disableOptionCentering]="true" [required]="required" multiple
            #select>
            <mat-select-trigger>
                <span class="first-selected-location">{{getFirstSelectedDisplayName()}}</span>
                <span *ngIf="locationControlOpt?.value?.length > 1" class="example-additional-selection">
                    (+{{multiSelectedVal?.length - 1}} {{locationControlOpt?.value?.length === 2 ? 'other' : 'others'}})
                </span>
            </mat-select-trigger>
            <br>
            <!-- <mat-option>
                <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrllocStatus"
                    [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder"
                    [clearSearchInput]="false">

                </ngx-mat-select-search>
            </mat-option> -->
            <div class="select-all">
                <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
            </div>
            <mat-option *ngFor="let list of locationData | emplListRecFilter:searchInput" [value]="list.LocID"
                (click)="optionClick()">
                {{list?.LocName}} 
            </mat-option>
        </mat-select>

    </mat-form-field>
</div>
