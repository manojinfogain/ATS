<div class="int-panel-selectionf" *ngIf="!isMultiple">
  <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
    <mat-label appRemoveAriaOwns >{{title}}</mat-label>
    <mat-select [formControl]="panelIdControl" [disableOptionCentering]="true" [required]="required"
      (selectionChange)="getSkill($event)">
      <mat-option>
        <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
          [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder" [clearSearchInput]="false">

        </ngx-mat-select-search>
      </mat-option>
      <mat-option value="all" *ngIf="isAllOption">All</mat-option>
      <ng-container *ngIf="getOnlyText">
        <mat-option *ngFor="let list of skillDataList | skillFilter:searchInput" [value]="list.SKillName">
          {{list?.SKillName}}
        </mat-option>
      </ng-container>
      <ng-container *ngIf="!getOnlyText">
        <mat-option *ngFor="let list of skillDataList | skillFilter:searchInput" [value]="list.SkillId">
          {{list?.SKillName}}
        </mat-option>
      </ng-container>
    </mat-select>

  </mat-form-field>
</div>
<!-- multi selection -->


<div class="int-panel-selection-multi" *ngIf="isMultiple">
  <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
    <mat-label appRemoveAriaOwns >{{title}}</mat-label>
    <mat-select [formControl]="panelIdControl" [disableOptionCentering]="true" [required]="required"
       multiple #select>
       <mat-select-trigger>
        {{multiSelectedVal.length !== 0 ? multiSelectedVal[0].viewValue : ''}}
        <span *ngIf="panelIdControl.value?.length > 1 && showCount > 1" class="example-additional-selection">
          (+{{showCount - 1}} {{panelIdControl.value?.length === 2 ? 'other' : 'others'}})
        </span>
      </mat-select-trigger>
      <mat-option>
        <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
          [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder" [clearSearchInput]="false">

        </ngx-mat-select-search>
      </mat-option>
      
      <div class="select-all" *ngIf="isAllText && !searchInput">
        <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
      </div>
      <mat-option *ngFor="let list of sortedSkillDataList | skillFilter:searchInput" (click)="optionClick()"
        [value]="list.SkillId">
        {{list?.SKillName}}
      </mat-option>
    </mat-select>

  </mat-form-field>
</div>
