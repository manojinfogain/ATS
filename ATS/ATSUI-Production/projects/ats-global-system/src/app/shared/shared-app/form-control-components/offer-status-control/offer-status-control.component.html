<div class="form-row" *ngIf="!isMultiple">
    <mat-form-field appearance="outline" class="place-from-control">
        <mat-label appRemoveAriaOwns >{{offerStatusTitle}}</mat-label>
        <mat-select [formControl]="offerStatusControlOpt">
            <mat-option>
                  <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrlOfferStatus"
                    [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="'Search'" [clearSearchInput]="false">
                  </ngx-mat-select-search>
                </mat-option>
            <mat-option value="all">All</mat-option>
            <mat-option value="0" *ngIf="dropPendingWithMeOfferApr">
                Pending With Me
            </mat-option>

            <mat-option *ngFor="let list of offerStatusList | offerStatusPipe:searchInputOffer"
                [value]="list?.statusId"> {{list?.statusName}}</mat-option>
        </mat-select>
    </mat-form-field>
</div>

<div class="form-row" *ngIf="isMultiple">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
        <mat-label appRemoveAriaOwns >{{offerStatusTitle}}</mat-label>
        <mat-select [formControl]="offerStatusControlOpt" [disableOptionCentering]="true" [required]="required" multiple
            #select>
            <mat-select-trigger>
                {{multiSelectedVal.length !== 0 ? multiSelectedVal[0].viewValue : ''}}
                <span *ngIf="offerStatusControlOpt?.value?.length > 1 && showCount > 1" class="example-additional-selection">
                    (+{{showCount - 1}} {{offerStatusControlOpt?.value?.length === 2 ? 'other' :
                    'others'}})
                </span>
            </mat-select-trigger>
            <br>
            <mat-option>
                <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrlOfferStatus"
                    [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder"
                    [clearSearchInput]="false">

                </ngx-mat-select-search>
            </mat-option>
            <!-- <mat-option value="all">All</mat-option> -->
            <mat-option value="0" *ngIf="dropPendingWithMeOfferApr">
                Pending With Me
            </mat-option>
            <div class="select-all" *ngIf="!searchInputOffer">
                <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
            </div>
            <mat-option *ngFor="let list of offerStatusList | offerStatusPipe:searchInputOffer" [value]="list.statusId"
                (click)="optionClick()">
                {{list?.statusName}}
            </mat-option>
        </mat-select>

    </mat-form-field>
</div>
