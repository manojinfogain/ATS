
  <div class="int-panel-selectionf">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
      <mat-label appRemoveAriaOwns >{{title}}</mat-label>
      <mat-select [formControl]="parentIdControl"  [disableOptionCentering]="true" [required]="required"
      (selectionChange)="getCity($event)" >
        <mat-option>
          <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
            [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder" [clearSearchInput]="false">
            
          </ngx-mat-select-search>
        </mat-option>
        <mat-option *ngFor="let list of cityListData | CityFilter:searchInput" [value]="list.id" 
          >
          {{list?.city_name}}
        </mat-option>
      </mat-select>
  
    </mat-form-field>
  </div>
