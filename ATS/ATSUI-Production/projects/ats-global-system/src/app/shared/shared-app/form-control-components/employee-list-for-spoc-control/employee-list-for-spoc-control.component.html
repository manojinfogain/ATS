<div class="int-panel-selection" *ngIf="!isMultiple">
    <mat-form-field  [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
      <mat-label appRemoveAriaOwns >{{title}}</mat-label>
      <mat-select  [formControl]="panelIdControl" [disableOptionCentering]="true" [required]="required" 
      (selectionChange)="getEmp($event)">
        <mat-option>
          <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
            [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder" [clearSearchInput]="false">
            
          </ngx-mat-select-search>
        </mat-option>
        <mat-option *ngFor="let list of getAllEmp  | panelFilter:searchInput" [value]="list.empnewid" 
          >
          {{list?.fullName}}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>
  
  <div class="int-panel-selection" *ngIf="isMultiple">
    <mat-form-field  [appearance]="formFieldAppearance" [floatLabel]="floatLabel"  class="addl-cand-col-wd">
      <mat-label appRemoveAriaOwns >{{title}}</mat-label>
      <mat-select  class="addl-cand-col-wd" (openedChange)="closeDropDown()"  [formControl]="panelIdControl" [disableOptionCentering]="true" [required]="required" multiple>      
        <mat-select-trigger>
          {{panelIdControl?.value ? triggerFunc(panelIdControl?.value[0]) : ''}}
          <span *ngIf="panelIdControl?.value?.length > 1" class="example-additional-selection">
            (+{{panelIdControl?.value?.length - 1}} {{panelIdControl?.value?.length === 2 ? 'other' : 'others'}})
          </span>
      </mat-select-trigger>
        <mat-option>
          <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
            [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder" [clearSearchInput]="false">
            
          </ngx-mat-select-search>
        </mat-option>
        <mat-option *ngFor="let list of getAllEmp | panelFilter:searchInput" [value]="list?.empnewid" 
        >
          {{list?.fullName}}
        </mat-option>
      </mat-select>
  
    </mat-form-field>
  </div>
