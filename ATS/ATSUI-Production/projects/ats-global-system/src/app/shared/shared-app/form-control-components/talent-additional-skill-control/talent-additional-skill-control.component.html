<div class="form-control-sam" *ngIf="isMultiple">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
        <mat-label appRemoveAriaOwns >{{title}}</mat-label>
        <mat-select [formControl]="IdControl" [disableOptionCentering]="true" [required]="required"
           multiple #select 
           (closed)="onBlure($event)" [disabled]="isDisabledForEdit">
           <mat-select-trigger>
            {{multiSelectedVal.length !== 0 ? multiSelectedVal[0].viewValue : ''}}
            <span *ngIf="IdControl.value?.length > 1" class="example-additional-selection">
              (+{{IdControl.value.length - 1}} {{IdControl.value?.length === 2 ? 'other' : 'others'}})
            </span>
          </mat-select-trigger>
          <mat-option>
            <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrlAccount"
                [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="'Search'" [clearSearchInput]="false">
            </ngx-mat-select-search>
        </mat-option>
          <div class="select-all" *ngIf="projectList.length !== 0">
            <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
          </div>
          <mat-option *ngFor="let list of additionalSkillList| additionalSkillFilter:searchInputAdditionalSkills" 
          [value]="list?.skillid" (click)="optionClick()">
            {{list?.skill}}</mat-option>
        </mat-select>
    
      </mat-form-field>
</div>
