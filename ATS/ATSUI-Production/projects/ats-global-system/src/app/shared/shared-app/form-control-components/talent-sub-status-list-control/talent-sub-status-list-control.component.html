<div class="form-row" *ngIf="!isMultiple">
    <mat-form-field  [appearance]="formFieldAppearance"  [floatLabel]="floatLabel" class="place-from-control">
        <mat-label appRemoveAriaOwns >{{subStatusTitle}}</mat-label>
      <mat-select [formControl]="talentsubStatusControlOpt"  (selectionChange)="getSelectId($event)">
        <mat-option value="all">All</mat-option>
        <mat-option *ngFor="let list of subStatusData" [value]="list?.subStatusId">{{list?.subStatusName}}</mat-option>
      </mat-select>
    </mat-form-field>

  </div>

  <div class="select-ats-src" *ngIf="isMultiple">
    <mat-form-field [appearance]="formFieldAppearance"  [floatLabel]="floatLabel">
        <mat-label appRemoveAriaOwns >{{subStatusTitle}}</mat-label>
        <mat-select [formControl]="talentsubStatusControlOpt" [disableOptionCentering]="true" [required]="required" multiple
            #select>
            <mat-select-trigger>
                {{multiSelectedVal.length !== 0 ? multiSelectedVal[0].viewValue : ''}}
                <span *ngIf="talentsubStatusControlOpt?.value?.length > 1" class="example-additional-selection">
                    (+{{multiSelectedVal.length - 1}} {{talentsubStatusControlOpt?.value?.length === 2 ? 'other' : 'others'}})
                </span>
            </mat-select-trigger>
            <!-- <mat-option>
                <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
                    [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder"
                    [clearSearchInput]="false">

                </ngx-mat-select-search>
            </mat-option> -->
            <div class="select-all">
                <br>
                <mat-checkbox [(ngModel)]="allSelected" (change)="toggleAllSelection()">Select All</mat-checkbox>
            </div>
            <mat-option *ngFor="let list of subStatusData" [value]="list.subStatusId"
                (click)="optionClick()">
                {{list?.subStatusName}} 
            </mat-option>
        </mat-select>

    </mat-form-field>
</div>
