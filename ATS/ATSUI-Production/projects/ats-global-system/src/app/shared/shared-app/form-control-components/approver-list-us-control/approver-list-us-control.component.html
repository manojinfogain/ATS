<div class="int-panel-selection pannel-approval-us">
    <mat-form-field [appearance]="formFieldAppearance" [floatLabel]="floatLabel">
      <mat-label appRemoveAriaOwns >{{title}}</mat-label>
      <mat-select [formControl]="panelIdControl" [disableOptionCentering]="true" [required]="required">
        <mat-option>
          <ngx-mat-select-search class="mat-selec-search-youxta" [formControl]="FilterCtrl"
            [noEntriesFoundLabel]="'No record Found'" [placeholderLabel]="placeholder" [clearSearchInput]="false">
            
          </ngx-mat-select-search>
        </mat-option>
        <mat-option *ngFor="let list of getAllEmp | panelFilter:searchInput" [value]="isDelegatorList ? list.EmpID : list.empnewid" 
          >
          {{isDelegatorList ? list.FullName : list?.fullName}}{{isDelegatorList ? "("+ list.EmpID +")" : "("+ list.empnewid +")"}}
        </mat-option>
      </mat-select>
  
    </mat-form-field>
  </div>
