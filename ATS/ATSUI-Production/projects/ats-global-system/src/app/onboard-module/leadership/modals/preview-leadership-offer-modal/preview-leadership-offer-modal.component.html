    <div class="ats-modal-body" *ngIf="data?.isOfferPayroll === 'Y'">
        <div class="panel-content">
            <div class="can-view-wrap">
                <div class="can-list-view">
                    <h5>Preview Offer letter:</h5>
                    <p>
                        <button type="button" class="btn-ey-v" matTooltip="Preview  Offer"
                            (click)="previewOfferletter(data?.CandidateId)">
                            <span class="material-icons-outlined">
                                picture_as_pdf
                            </span>
                        </button>
                    </p>
                </div>
              
                <div class="can-list-view">
                    <h5>Preview Sodexo Form:</h5>
                    <p>

                            </span>
                        </button>
                    </p>
                </div>
               
            </div>
        </div>
    </div>
