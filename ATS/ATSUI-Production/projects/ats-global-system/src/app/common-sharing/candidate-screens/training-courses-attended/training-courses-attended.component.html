    <!-- end head -->
    <div class="can-temp-b">
        <div class="cand-ot-table">
            <table mat-table [dataSource]="trainingCoursesList" class="table-mat-info">
                <!-- Checkbox Column -->
                <ng-container matColumnDef="Category">
                    <th mat-header-cell *matHeaderCellDef>
                        Name Of the Course
                    </th>
                    <td mat-cell *matCellDef="let element">

                        {{(element?.courseName)|| '-'}}
                    </td>
                </ng-container>
                <!-- ends -->
                <ng-container matColumnDef="duration">
                    <th mat-header-cell *matHeaderCellDef>
                        Duration
                    </th>
                    <td mat-cell *matCellDef="let element">
                        {{(element?.fromDate | date:'mediumDate')|| '-'}}
                        To
                        {{(element?.toDate | date:'mediumDate')|| '-'}}
                    </td>
                </ng-container>
                <!-- ends -->
                <ng-container matColumnDef="institudeOrganuzation">
                    <th mat-header-cell *matHeaderCellDef>
                        Institute/Organization
                    </th>
                    <td mat-cell *matCellDef="let element">
                        {{(element?.instituteOrgName)|| '-'}}
                    </td>
                </ng-container>
                <!-- ends -->
                <ng-container matColumnDef="WhetherCerticateAward">
                    <th mat-header-cell *matHeaderCellDef>
                        Whether certificate Awarded
                    </th>
                    <td mat-cell *matCellDef="let element">
                        {{(element?.certificateAward)|| '-'}}
                    </td>
                </ng-container>
                <!-- ends -->

                <ng-container matColumnDef="action" stickyEnd>
                    <th mat-header-cell *matHeaderCellDef> Action</th>
                    <td mat-cell *matCellDef="let element" class="text-left">
                        <div class="btn-action btn-action-centers">
                            <div class="btn-act">
                                <button mat-button type="button" matTooltip="Update Details">
                                    <span class="material-icons-outlined">
                                        mode_edit_outline
                                    </span>
                                </button>
                            </div>

                        </div>
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;let i = index">
                </tr>
            </table>
            <app-no-result-found *ngIf="trainingCoursesList?.length === 0">
            </app-no-result-found>
        </div>
    </div>
</div>
