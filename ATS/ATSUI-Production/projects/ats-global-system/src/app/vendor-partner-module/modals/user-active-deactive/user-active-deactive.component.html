<form [formGroup]="formActiveUser" (ngSubmit)="sumbitForm(formActiveUser)">
    <div class="ats-modal-header ata-text-cap">
        <h1>{{data?.title}}
            <ng-container *ngIf="data?.type !=4">
                {{data?.PartnerName}}
            </ng-container>
            </h1>
        <button class="btn-m-close" type="button" (click)="closeModal()"><i class="fa fa-times"></i></button>
    </div>
    <div mat-dialog-content>
        <div class="ats-modal-body">
            <!-- <input type="hidden" formControlName="telentId"> -->
            <div class="ats-forms ats-forms-horz ats-form-dark">

                <div class="ats-form-col">
                    <mat-form-field appearance="outline">
                        <mat-label>Remarks</mat-label>
                        <textarea matInput placeholder="Enter Remark" maxlength="500" formControlName="remarks"
                            disableInitialSpace required>></textarea>
                    </mat-form-field>
                </div>
                <!-- end col -->
            </div>

        </div>
    </div>
    <div class="ats-modal-footer">
        <button type="submit" class="btn btn-infocon">
            Submit
        </button>
        <button type="button" class="btn btn-simple-ats" (click)="closeModal()">Cancel
        </button>
    </div>
</form>
