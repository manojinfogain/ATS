        <!-- section -->

            <!-- <div class="box-v-header">

            <div class="box-v-body table-body">
                <div class="apr-list aprover-dt-list mxv-h-100">
                    <table mat-table [dataSource]="proposedEmpList" class="table-mat-info">
                        <ng-container matColumnDef="sno">
                            <th mat-header-cell *matHeaderCellDef>S. No</th>
                            <td mat-cell *matCellDef="let element; let i=index" class="text-center"> {{i+1}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="checkName">
                            <th mat-header-cell *matHeaderCellDef>Check Name</th>
                            <td mat-cell *matCellDef="let element"> {{element?.CheckName || '-'}}</td>
                        </ng-container>
                        <ng-container matColumnDef="checkStatus">
                            <th mat-header-cell *matHeaderCellDef>Check Status</th>
                            <td mat-cell *matCellDef="let element"> {{element?.CheckStatus || '-'}}</td>
                        </ng-container>


                        <ng-container matColumnDef="colorCode">
                            <th mat-header-cell *matHeaderCellDef>Color Code</th>
                            <td mat-cell *matCellDef="let element" class="text-center">
                                <ng-container [ngSwitch]="element?.ColorCode">
                                    <ng-container *ngSwitchCase="'Red'">
                                        <button class="btn-status-dg rejects" type="button">
                                            {{element?.ColorCode}}
                                        </button>
                                    </ng-container>
                                    <ng-container *ngSwitchCase="'Green'">
                                        <button class="btn-status-dg shortlisted" type="button">
                                            {{element?.ColorCode}}
                                        </button>
                                    </ng-container>
                                    <ng-container *ngSwitchDefault>
                                        <button class="btn-status-dg" type="button">
                                            {{element?.ColorCode || '-'}}
                                        </button>
                                    </ng-container>
                                </ng-container>
                            </td>
                        </ng-container>

                        <ng-container matColumnDef="remarks">
                            <th mat-header-cell *matHeaderCellDef>Remarks</th>
                            <td mat-cell *matCellDef="let element"> {{element?.Remarks || '-'}}</td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                        <tr mat-row *matRowDef="let row; columns: displayedColumns;let i = index"
                            [ngClass]="{'trActive':row?.isActive != 1}"></tr>
                    </table>
                    <app-no-result-found [searchedValue]="searchInput"
                        *ngIf="proposedEmpList?.length === 0 || proposedEmpList?.length === null">
                    </app-no-result-found>
                </div>
            </div>
            <!-- end -->
        </div>

    </div>
