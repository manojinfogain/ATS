<form [formGroup]="sendOfferToHrForm" (ngSubmit)="sendOfferToHrHandler(sendOfferToHrForm)">
    <div class="ats-modal-header ata-text-cap">
        <h1>Send Offer to HR</h1>
        <button class="btn-m-close" type="button" (click)="closeModal()"><i class="fa fa-times"></i></button>
    </div>
    <div mat-dialog-content>
        <div class="ats-modal-body">
            <!-- <input type="hidden" formControlName="thid"> -->
            <div class="ats-forms ats-forms-horz">
                <div class="ats-form-col search-input">
                    <mat-form-field>
                        <mat-label appRemoveAriaOwns >Select HR Approver</mat-label>
                        <mat-select formControlName="hrApprover">
                            <mat-option>
                                <ngx-mat-select-search class="mat-selec-search-youxta"
                                    [formControl]="FilterCtrlTagUS" [noEntriesFoundLabel]="'No record Found'"
                                    [placeholderLabel]="'Search'" [clearSearchInput]="false">

                                </ngx-mat-select-search>
                            </mat-option>
                            <mat-option *ngFor="let list of usHrList | tagLeadApproUS:searchInputTagUs"
                                [value]="list.EmpId">
                                {{list?.Name}}{{" ("+ list.EmpId +")"}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <!-- end col -->

                <div class="ats-form-col">
                    <mat-form-field>
                        <textarea matInput placeholder="Remarks" maxlength="500" formControlName="remarks"
                        disableInitialSpace ></textarea>
                        <!-- <input matInput placeholder="Remarks" maxlength="500" formControlName="remarksTransfer"
                            disableInitialSpace required> -->
                    </mat-form-field>
                </div>
                <!-- end col -->
            </div>

        </div>
    </div>
    <div class="ats-modal-footer">
        <button type="submit" class="btn btn-infocon">
            Submit
        </button>
        <button type="button" class="btn btn-simple-ats" (click)="closeModal()">Cancel
        </button>
    </div>
</form>
